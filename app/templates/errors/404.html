{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="error-page d-flex align-items-center justify-content-center min-vh-85">
  <div class="container text-center py-5">
    <div class="error-code">404</div>
    <div class="error-icon"><i class="bi bi-search"></i></div>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-desc text-muted">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex justify-content-center gap-3 mt-4">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary"><i class="bi bi-house-fill me-2"></i>Go Home</a>
      <button onclick="history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Go Back</button>
    </div>
  </div>
</div>
{% endblock %}
