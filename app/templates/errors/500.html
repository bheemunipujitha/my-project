{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="error-page d-flex align-items-center justify-content-center min-vh-85">
  <div class="container text-center py-5">
    <div class="error-code text-danger">500</div>
    <div class="error-icon"><i class="bi bi-exclamation-triangle-fill text-danger"></i></div>
    <h2 class="error-title">Internal Server Error</h2>
    <p class="error-desc text-muted">Something went wrong on our end. Please try again in a moment.</p>
    <div class="d-flex justify-content-center gap-3 mt-4">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary"><i class="bi bi-house-fill me-2"></i>Go Home</a>
      <button onclick="location.reload()" class="btn btn-outline-secondary"><i class="bi bi-arrow-clockwise me-2"></i>Retry</button>
    </div>
  </div>
</div>
{% endblock %}
