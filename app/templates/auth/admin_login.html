{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="admin-login-page d-flex align-items-center justify-content-center min-vh-85 py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="login-card">
          <!-- Logo -->
          <div class="login-logo text-center mb-4">
            <div class="login-icon">
              <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h4 class="mt-3 fw-700">Admin Access</h4>
            <p class="text-muted small">CreditPredict AI — Admin Panel</p>
          </div>

          <!-- Form -->
          <form method="POST" action="{{ url_for('admin.login') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group-custom mb-3">
              <label class="form-label-custom">Username</label>
              <div class="input-group-custom">
                <span class="input-prefix"><i class="bi bi-person-fill"></i></span>
                <input type="text" class="form-control-custom" name="username"
                       placeholder="admin" required autofocus>
              </div>
            </div>

            <div class="form-group-custom mb-4">
              <label class="form-label-custom">Password</label>
              <div class="input-group-custom">
                <span class="input-prefix"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control-custom" name="password"
                       placeholder="••••••••" required id="loginPassword">
                <button type="button" class="input-suffix-btn"
                        onclick="togglePassword('loginPassword', this)">
                  <i class="bi bi-eye-fill"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-login">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login to Admin Panel
            </button>
          </form>

          <div class="login-footer text-center mt-4">
            <a href="{{ url_for('main.index') }}" class="text-muted small">
              <i class="bi bi-arrow-left me-1"></i>Back to Home
            </a>
          </div>

          <!-- Default credentials hint (dev only) -->
          <div class="dev-hint mt-3">
            <i class="bi bi-info-circle-fill me-1"></i>
            Default: <code>admin</code> / <code>admin123</code>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash-fill';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye-fill';
  }
}
</script>
{% endblock %}
